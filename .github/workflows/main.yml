name: Deploy do Lovable

on:
  push:
    branches: [ "main" ]

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Instalar dependências
        run: bun install

      - name: Build do Site
        run: bun run build

      - name: Atualizar pasta do Servidor
        run: |
          sudo mkdir -p /var/www/html/meu-site
          sudo cp -r dist/. /var/www/html/meu-site/
