name: deploy-lovable
on:
  push:
    branches:
      - main
jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - name: checkout
        uses: actions/checkout@v4
      - name: build
        run: |
          export PATH="$HOME/.bun/bin:/usr/local/bin:$PATH"
          bun install
          bun run build
      - name: sync
        run: |
          sudo /usr/bin/mkdir -p /var/www/html/meu-site
          sudo /usr/bin/cp -r dist/. /var/www/html/meu-site/
