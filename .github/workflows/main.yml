name: Deploy-Lovable
on:
  push:
    branches:
      - main
jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Instalacao
        run: /usr/local/bin/bun install

      - name: Build
        run: /usr/local/bin/bun run build

      - name: Deploy-Arquivos
        run: |
          sudo /usr/bin/mkdir -p /var/www/html/meu-site
          sudo /usr/bin/cp -r dist/. /var/www/html/meu-site/
