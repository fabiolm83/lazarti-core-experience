name: Deploy do Lovable

on:
  push:
    branches: [ "main" ]

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Instalar Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Build do Site
        run: |
          bun install
          bun run build

      - name: Atualizar pasta do Servidor
        run: |
          # Cria a pasta caso não exista
          sudo mkdir -p /var/www/html/meu-site
          # Limpa o conteúdo antigo e copia o novo build (pasta dist)
          sudo cp -r dist/* /var/www/html/meu-site/
